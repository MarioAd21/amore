<!DOCTYPE html> 
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ 21-11-2016</title>
    <link rel="icon" href="https://i.pinimg.com/originals/38/e7/3a/38e73ab9ccd7da9649c2857f70e848b4.gif" type="image/gif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 20px;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {color: cadetblue; font-family: "Dancing Script", cursive; font-size: 3.5rem; margin-bottom: 5px; text-align: center;}
        h2 {color: yellow; font-family: 'Dancing Script', cursive; font-size: 2.2rem; margin-top: 0; text-align: center;}
    
        /* --- PRESENTACION --- */
        .introduccion-amor {
            max-width: 600px;
            text-align: center;
            font-style: italic;
            color: #ccc;
            margin-bottom: 30px;
        }
 
        /* --- CONTADOR --- */
        .contador-container {                                      
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid cadetblue;
            border-radius: 20px;
            padding: 15px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 15px rgba(95, 158, 160, 0.3);
            margin-bottom: 40px;
        }

        /* --- FECHA --- */
        .bloque-fecha { 
            font-size: 1.4rem;
            color: #4da6ff;
            font-weight: bold;
        }

        /* --- TIEMPO --- */
        .bloque-tiempo {
            font-size: 2rem;
            color: #05877d;
            font-weight: bold;
            margin-top: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 242, 0.503);
        }

        /* LINEA QUE SEPARA EL TEXTO DE LA LINEA DE TIEMPO */
        .separador {
            width: 80%;
            max-width: 1400px;
            height: 2px;
            background: linear-gradient(to right, transparent, rgb(44, 138, 84), transparent);
            margin: 20px auto;
            border-radius: 2px;
        }

        /* --- LÍNEA DE TIEMPO  --- */
      
        

                /* Contenedor principal en la esquina inferior derecha */
        #contenedor-reproductor {
            position: fixed;
    bottom: 25px;
    right: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
        }
        
        /* El círculo con la nota musical */
        #boton-musica {
            width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: cadetblue;
    border: 3px solid white;
    font-size: 25px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    transition: transform 0.3s;
        }
        
        #boton-musica:hover {
            transform: scale(1.1);
        }
        
        /* El reproductor de YouTube */
        #reproductor-mini {
            position: relative;
    margin-bottom: 15px;
    width: 320px;
    height: 180px;
    border-radius: 20px; /* Bordes redondeados como en tu imagen */
    overflow: visible;
    border: 3px solid cadetblue;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    background: black;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

/* Ajuste del video para que ocupe todo el espacio */
#reproductor-mini iframe {
    width: 100%;
    height: 100%;
    border-radius: 15px; /* Un poco menos que el padre para que encaje */
}        

        #btn-cerrar-repro {
    position: absolute;
    top: -15px;
    right: -15px;
    background: cadetblue;
    color: white;
    border: 3px solid white;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    z-index: 1001;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
        
        /* Clase para ocultar/mostrar con suavidad */
        .oculto {
            opacity: 0;
    transform: scale(0) translateY(100px);
    pointer-events: none;
    height: 0 !important;
    margin-bottom: 0 !important;
        }
        
        /* Ajuste para móvil: más pequeño */
        @media (max-width: 600px) {
            #reproductor-mini {
                width: 250px;
                height: 150px;
            }
        }


         @media (max-width: 600px) {
            h1 { 
                font-size: 2.2rem; /* Título un poco más pequeño en móvil */
            }
            
            h2 {
                font-size: 1.6rem;
            }
    
            .contador-container {
                width: 95%; /* Que ocupe casi todo el ancho */
                padding: 15px 5px;
            }
    
            .bloque-fecha {
                font-size: 1.3rem; /* Tamaño legible pero compacto */
            }
    
            .bloque-tiempo {
                font-size: 1.8rem; /* Evita que los números se amontonen */
                margin-top: 5px;
                letter-spacing: -1px; /* Junta un poco los números para ganar espacio */
            }
        }

        

    </style>

 <script>
    // Título dinámico
    let toggle = true;
    setInterval(() => {
        document.title = toggle ? "❤️ 21-11-2016" : "🖤 21-11-2016";
        toggle = !toggle;
    }, 1000);

    // Configuración de la fecha de inicio
    const fechaInicio = new Date(2016, 10, 21, 0, 0, 0); 

    function actualizarContador() {
        const ahora = new Date();
        let años = ahora.getFullYear() - fechaInicio.getFullYear();
        let meses = ahora.getMonth() - fechaInicio.getMonth();
        let dias = ahora.getDate() - fechaInicio.getDate();

        if (dias < 0) {
            meses--;
            const ultimoDiaMesAnterior = new Date(ahora.getFullYear(), ahora.getMonth(), 0).getDate();
            dias += ultimoDiaMesAnterior;
        }
        if (meses < 0) {
            años--;
            meses += 12;
        }

        const horas = ahora.getHours();
        const minutos = ahora.getMinutes();
        const segundos = ahora.getSeconds();

        const reloj = document.getElementById('reloj');
        if (reloj) {
            reloj.innerHTML = `
                <div class="bloque-fecha">${años} años, ${meses} meses, ${dias} días</div>
                <div class="bloque-tiempo">${horas}h : ${minutos}m : ${segundos}s</div>
            `;
        }
    }

    // Función del Reproductor Corregida
    function toggleReproductor() {
        const reproductor = document.getElementById('reproductor-mini');
        const boton = document.getElementById('boton-musica');
        
        if (reproductor && boton) {
            reproductor.classList.toggle('oculto');
            
            // Cambiar el icono del botón según si está oculto o no
            if (reproductor.classList.contains('oculto')) {
                boton.innerHTML = "🎵";
            } else {
                boton.innerHTML = "❌";
            }
        }
    }

    // Iniciar funciones al cargar
    setInterval(actualizarContador, 1000);
    window.onload = actualizarContador;
</script>


</head>

<body>

    <h1>Feliz Aniversario Amore</h1>
    <h2>Ya 10 años juntos, ¡cómo pasa el tiempo!</h2>

    <p class="introduccion-amor">
        "Aquí empieza el viaje de nuestros primeros 10 años. Cada foto es un recuerdo de risas, aventuras y de todo lo que hemos construido juntos. Te amo por siempre."
    </p>

    <div class="contador-container">
        <h3 style="margin-top:0">Llevamos juntos:</h3>
        <div id="reloj">Cargando nuestro tiempo...</div>
    </div>

    <div class="separador"></div>


    
   <div id="contenedor-reproductor">
    <div id="reproductor-mini" class="oculto">
        <button id="btn-cerrar-repro" onclick="toggleReproductor()">❌</button>
        <iframe 
            id="video-youtube"
            src="https://www.youtube.com/embed/zpWVMosq1oM?enablejsapi=1" 
            frameborder="0" 
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

    <button id="boton-musica" onclick="toggleReproductor()">
        🎵
    </button>
</div>

   
    


</body>

</html>
