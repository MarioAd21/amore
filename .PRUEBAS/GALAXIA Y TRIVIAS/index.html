<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>❤️ 21-11-2016</title>
    
    <link rel="stylesheet" href="galaxia.css">
    <link rel="stylesheet" href="trivia.css">
    <link rel="stylesheet" href="cometa.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Solo dejamos las variables y las reglas globales críticas */
        :root {
            --color-fondo: #000000;
            --color-primario: cadetblue;
            --color-acento: #7FFFD4; 
            --color-texto: #E0E0E0;
            --color-titulo: #B0C4DE;
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background-color: var(--color-fondo);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100svh; /* Adaptación para pantallas móviles modernas */
            position: relative; 
        }

        /* 🚀 OPTIMIZACIÓN: Fondo anclado para evitar saltos en iPhone/iPad */
        body::before {
            content: "";
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100svh; 
            z-index: -1;
            background-color: #05050a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(95, 158, 160, 0.25), transparent 60%),
                radial-gradient(circle at 85% 30%, rgba(127, 255, 212, 0.15), transparent 60%);
            background-size: cover;
            background-repeat: no-repeat;
        }

        .separador {
            width: 60%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--color-acento), transparent);
            margin: 40px auto;
        }
    </style>
</head>

<body>

    <h1 style="text-align: center; color: white; padding: 20px; font-size: 1.2rem; z-index: 10;">
        Esta galaxia se encuentra como yo antes de conocerte, si quieres darle vida y color tendrás que responder en cada planeta las trivias que dejé
    </h1>
    
    <div class="separador"></div>

    <section id="GALAXIA">
        <div class="galaxybody">
            <div id="cometa"></div>
            <div id="universo">
                <div id="corazon-central">❤️</div> 
            </div>

            <div id="contenedor-trivia" style="display:none;">
                <button id="btn-cerrar-trivia" onclick="cerrarTrivia()">×</button>
                <h2 id="trivia-titulo">Cargando...</h2>
                <p id="trivia-pregunta">Preparando preguntas...</p>
                <div id="trivia-opciones"></div>
            </div>

            <div id="modal-cometa">
                <h3 style="color:var(--color-primario);">✨ Susurro del Espacio ✨</h3>
                <p id="texto-cometa"></p>
                <button class="boton-opcion" onclick="closeCometModal()">Cerrar</button>
            </div>
        </div>
    </section>

    <script src="trivias.js"></script>
    <script src="galaxia.js"></script>
    <script src="cometa.js"></script>

</body>
</html>
