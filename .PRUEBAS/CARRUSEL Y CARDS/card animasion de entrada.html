<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Swiper Demo - Giro 3D Lento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@14.0.1/swiper-bundle.min.css" />

    <style>
      html, body { height: 100%; margin: 0; background: #000; }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1200px;
      }

      .swiper {
        width: 300px;
        height: 300px;
        transform-style: preserve-3d;
        /* ANIMACIÓN AJUSTADA: 4 segundos para un efecto más lento */
        animation: spin-intro 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      }

      @keyframes spin-intro {
        0% { transform: rotateY(0deg) scale(0.5); }
        100% { transform: rotateY(1800deg) scale(1); }
      }

      .swiper-slide {
        border-radius: 15px;
        overflow: hidden;
      }

      .swiper-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <img src="https://swiperjs.com/demos/images/abstract-1.jpg" alt="Cara frontal" />
        </div>
        <div class="swiper-slide">
          <img src="https://images.unsplash.com/photo-1505506874110-6a7a69069a08?q=80&w=687" alt="Cara trasera" />
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@14.0.1/swiper-bundle.min.js"></script>
    <script>
      var swiper = new Swiper('.mySwiper', {
        effect: 'flip',
        grabCursor: true,
        loop: true,
        speed: 1200,
        flipEffect: { slideShadows: true, limitRotation: true }
      });

      // Se ajustó el tiempo de espera a 4000ms (4 segundos) 
      // para que coincida con la nueva duración de la animación
      setTimeout(() => {
        swiper.params.autoplay = { delay: 3000, disableOnInteraction: false };
        swiper.autoplay.start();
      }, 4000); 
    </script>
  </body>
</html>
