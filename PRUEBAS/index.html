<!DOCTYPE html> 
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>❤️ 21-11-2016</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="carrusel.css">
    <link rel="stylesheet" href="card.css">
</head>

<body>

    <section id="CARRUSEL">
        <h2 style="margin-top: 20px; text-align: center;">El Carrusel del Recuerdo</h2>
        <p style="font-size: 0.9rem; color: #888; text-align: center; margin: 5px auto;">(Desliza o usa la rueda del mouse para navegar)</p>
        
        <div id="contenedor" class="escena-stack"></div>
        
        <div id="modal-carta-3d">
            <div class="btn-cerrar-carta" onclick="cerrarCarta3D()">✖</div>
            
            <div id="polvo-estelar"></div>
            
            <div class="carta-container" id="carta-animada">
                <div class="carta-wrapper" id="tarjeta">
                
                    <div class="cara cara-frontal">
                        <img id="img-carta-frente" src="" alt="Frente" />
                    </div>
                    
                    <div class="cara cara-trasera" >
                        <div id="mensaje-carta" class="mensaje-texto"> </div>
                    </div>
                
                </div>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>        
        <script src="cards.js"></script>
        <script src="carrusel.js"></script>
    </section>

</body>
</html>
