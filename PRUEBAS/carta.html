<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Swiper Demo - Rotación 3D Continua y Suave</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@14.0.1/swiper-bundle.min.css"
    />

    <style>
      html,
      body {
        position: relative;
        height: 100%;
      }

      body {
        background: #000;
        font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
        font-size: 14px;
        color: #fff;
        margin: 0;
        padding: 0;
        
        perspective: 1200px; 
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .swiper {
        width: 300px;
        height: 300px;
        transform-style: preserve-3d;
        
        /* Animación rápida de entrada */
        animation: spin-intro 1.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
      }

      @keyframes spin-intro {
        0% { transform: rotateY(0deg) scale(0.5); }
        100% { transform: rotateY(1800deg) scale(1); }
      }

      .swiper-slide {
        background-position: center;
        background-size: cover;
        width: 300px;
        height: 300px;
        border-radius: 15px;
        overflow: hidden;
        
        /* EL SECRETO DE LA SUAVIDAD: 
           Esto fuerza a Swiper a mantener una velocidad constante sin acelerar ni frenar brusco */
        transition-timing-function: linear !important;
      }

      .swiper-slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <img src="https://swiperjs.com/demos/images/abstract-1.jpg" alt="Cara frontal" />
        </div>
        <div class="swiper-slide">
          <img src="https://swiperjs.com/demos/images/abstract-2.jpg" alt="Cara trasera" />
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@14.0.1/swiper-bundle.min.js"></script>

    <script>
      var swiper = new Swiper('.mySwiper', {
        effect: 'flip',
        loop: true, // Esto es lo que permite el ciclo infinito
        speed: 3500, // Velocidad de giro (a mayor número, más lento)
        flipEffect: { slideShadows: true },
        autoplay: {
          delay: 0, // Sin pausa entre giros
          disableOnInteraction: false,
          reverseDirection: true, // Gira en sentido inverso
          waitForTransition: false // Hace que el loop sea más fluido
        },
      });

      // Transición al giro lento y continuo
      setTimeout(() => {
        
        swiper.params.speed = 3500; // 3.5 segundos para dar la vuelta completa (muy lento)
        
        swiper.params.autoplay = {
          delay: 0, // 0 pausas entre caras, el giro nunca se detiene
          disableOnInteraction: false,
          reverseDirection: true,
          
        };
        
        swiper.autoplay.start();
        
      }, 1800); 
    </script>
  </body>
</html>
