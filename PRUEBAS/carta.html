<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Aniversario - Carta 3D y Polvo Estelar</title>
    
    <style>
      html, body { 
        height: 100%; 
        margin: 0; 
        background: #000; 
        perspective: 1200px; 
        display: flex; 
        justify-content: center; 
        align-items: center;
        overflow: hidden; 
      }
      
      #polvo-estelar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 1;
      }

      .carta-container {
        /* Puedes cambiar este tamaño si quieres que la foto sea más grande o rectangular */
        width: 300px; 
        height: 300px; 
        z-index: 10;
        animation: spin-intro 1.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
      }

      @keyframes spin-intro {
        0% { transform: rotateY(0deg) scale(0.5); }
        100% { transform: rotateY(1800deg) scale(1); } 
      }

      .carta-wrapper {
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        position: relative;
      }

      .giro-continuo {
        animation: rotacion-infinita 12s linear infinite;
      }

      @keyframes rotacion-infinita {
        from { transform: rotateY(0deg); }
        to { transform: rotateY(360deg); } 
      }

      .cara {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 15px;
        overflow: hidden;
        backface-visibility: hidden; 
        -webkit-backface-visibility: hidden;
        box-shadow: 0 10px 30px rgba(240, 230, 210, 0.2);
      }

      .cara img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover; /* Esto asegura que tu foto se adapte sin deformarse */
      }

      .cara-trasera {
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body>

    <div id="polvo-estelar"></div>

    <div class="carta-container">
      <div class="carta-wrapper" id="tarjeta">
        
        <div class="cara cara-frontal">
          <img src="https://swiperjs.com/demos/images/abstract-1.jpg" alt="Nuestra foto favorita" />
        </div>
        
        <div class="cara cara-trasera">
          <img src="https://swiperjs.com/demos/images/abstract-2.jpg" alt="Otra foto o un mensaje" />
        </div>
        
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
      // Control de la animación de la tarjeta
      setTimeout(() => {
        document.getElementById('tarjeta').classList.add('giro-continuo');
      }, 1800);

      // Script de Polvo Estelar
      // 2. TU SCRIPT DE POLVO ESTELAR MEJORADO
// Aumentamos de 50 a 150 estrellas para llenar más el espacio
const numberOfStars = 150; 
const starContainer = document.getElementById('polvo-estelar');

function createStardust() {
    if (!starContainer) return;

    for (let i = 0; i < numberOfStars; i++) {
        const star = document.createElement('div');
        
        star.style.position = 'absolute';
        // Las hacemos un poco más blancas/brillantes
        star.style.backgroundColor = 'rgba(255, 250, 240, 0.9)'; 
        star.style.borderRadius = '50%';
        star.style.pointerEvents = 'none';

        // Variamos el tamaño para que haya algunas más grandes
        const size = Math.random() * 3 + 1; 
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.left = Math.random() * 100 + 'vw';
        
        // Aumentamos el resplandor (glow)
        const glow = Math.random() * 8 + 3;
        star.style.boxShadow = `0 0 ${glow}px rgba(255, 250, 240, 0.8)`;

        if (typeof gsap !== 'undefined') {
            gsap.to(star, {
                duration: Math.random() * 3 + 2, 
                // Subimos la opacidad para que no se apaguen tanto
                opacity: Math.random() * 0.7 + 0.3, 
                y: '-=' + (Math.random() * 20 + 10), 
                x: '+=' + (Math.random() * 15 - 7.5), 
                repeat: -1, 
                yoyo: true, 
                ease: 'sine.inOut',
                delay: Math.random() * 2 
            });
        }
        starContainer.appendChild(star);
    }
}

document.addEventListener('DOMContentLoaded', createStardust);

      document.addEventListener('DOMContentLoaded', createStardust);
    </script>
  </body>
</html>
