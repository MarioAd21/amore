<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Rotación Infinita</title>
    <style>
      body {
        background: #000;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1000px;
        margin: 0;
      }

      .card-container {
        width: 300px;
        height: 300px;
        position: relative;
        transform-style: preserve-3d;
        /* ANIMACIÓN INFINITA: gira 360 grados de forma lineal constante */
        animation: rotate-infinite 6s linear infinite;
      }

      .face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden; /* Oculta la parte trasera para el efecto 3D */
        border-radius: 15px;
        overflow: hidden;
      }

      /* Posicionamos las caras una frente a la otra */
      .front { transform: rotateY(0deg); }
      .back { transform: rotateY(180deg); }

      .face img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      @keyframes rotate-infinite {
        from { transform: rotateY(0deg); }
        to { transform: rotateY(360deg); }
      }
    </style>
  </head>
  <body>

    <div class="card-container">
      <div class="face front">
        <img src="https://swiperjs.com/demos/images/abstract-1.jpg" alt="Front" />
      </div>
      <div class="face back">
        <img src="https://images.unsplash.com/photo-1505506874110-6a7a69069a08?q=80&w=687" alt="Back" />
      </div>
    </div>

  </body>
</html>
