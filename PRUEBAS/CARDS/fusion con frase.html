<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Carta: Entrada + Bucle Infinito (Sin Pausa)</title>
    <style>
      body {
        background: #000;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1500px;
        margin: 0;
        overflow: hidden;
      }

      /* 1. EL PADRE: Hace el efecto de entrada (escala y giro rápido que se va frenando) */
      .card-intro {
        width: 330px;
        height: 580px;
        transform-style: preserve-3d;
        /* cubic-bezier ajustado para que frene con mucha suavidad */
        animation: intro-fast 4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      /* 2. EL HIJO: Hace el bucle constante infinito desde el principio */
      .card-loop {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        animation: loop-slow 8s linear infinite;
      }

      .face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 25px; /* Curvas más pronunciadas para que no sea cuadrada */
        overflow: hidden;
        border: 5px solid rgba(3, 206, 241, 0.2); 
      }

      .front { transform: rotateY(0deg); }
      .back { transform: rotateY(180deg); }

      .face img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        
      }

      /* --- Animación del Padre (Entrada) --- */
      @keyframes intro-fast {
        0% { transform: rotateY(0deg) scale(0.5); }
        100% { transform: rotateY(1440deg) scale(1); } /* Da 4 vueltas y se detiene */
      }

      /* --- Animación del Hijo (Bucle Constante) --- */
      @keyframes loop-slow {
        0% { transform: rotateY(0deg); }
        100% { transform: rotateY(360deg); } /* Da 1 vuelta cada 6 segundos, para siempre */
      }

      #frase-trasera {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        box-sizing: border-box; /* Evita que el padding desborde la carta */
        color: white;
        font-size: 1.8rem;
        font-family: 'Dancing Script', cursive;
        text-shadow: 2px 2px 8px rgba(0,0,0,0.8); /* Sombra para que se lea bien sobre cualquier foto */
        z-index: 10;
      }
    </style>

  </head>
  <body>

    <div class="card-intro">
      
      <div class="card-loop">
        
        <div class="face front">
          <img src="https://picsum.photos/300/300?random=20" alt="Frente" />
        </div>
        
        <div class="face back">
          <img src="https://picsum.photos/300/300?random=21" alt="Atrás" />
          <div id="frase-trasera"></div> 
        </div>
        
      </div>
      
    </div>

    <script>
      const frases = [
        "Te amo hoy y siempre",
        "Eres mi mejor recuerdo",
        "21-11-2016: Nuestro inicio",
        "Cada momento contigo es magia",
        "Juntos es mi lugar favorito"
      ];

      // Selecciona una frase aleatoria
      const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];

      // La inyecta en el div de la cara trasera
      document.getElementById('frase-trasera').innerText = fraseAleatoria;
    </script>

  </body>
</html>
